<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contabilidad de la Obra</title>
<style>
  :root {
    --bg: #f4f1ec;
    --card: #ffffff;
    --ink: #2b2b2b;
    --muted: #8a8578;
    --accent: #b05730;
    --green: #3d7a4a;
    --red: #b03030;
    --border: #e3ded4;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 16px;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 { font-size: 1.5rem; margin: 8px 0 2px; }
  .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 18px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  /* ---- Resumen ---- */
  .resumen-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) { .resumen-grid { grid-template-columns: 1fr; } }
  .moneda-box h2 {
    font-size: 1rem;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge {
    font-size: .7rem;
    background: var(--accent);
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .fila { display: flex; justify-content: space-between; font-size: .92rem; padding: 4px 0; }
  .fila .label { color: var(--muted); }
  .fila.total { border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; font-weight: 600; }
  .saldo {
    margin-top: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: .9rem;
    background: #f0ede6;
  }
  .saldo.ok { background: #e8f2ea; color: var(--green); }

  /* ---- Formulario ---- */
  form { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  @media (max-width: 600px) { form { grid-template-columns: repeat(2, 1fr); } }
  .campo { display: flex; flex-direction: column; gap: 4px; }
  .campo label { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
  input, select {
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .95rem;
    background: #fbfaf7;
    width: 100%;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .campo.fecha { grid-column: span 2; }
  .campo.concepto { grid-column: span 4; }
  .campo.monto { grid-column: span 2; }
  .campo.moneda { grid-column: span 2; }
  .campo.pagador { grid-column: span 2; }
  .campo.notas { grid-column: span 4; }
  .campo.boton { grid-column: span 2; justify-content: flex-end; }
  @media (max-width: 600px) {
    .campo.fecha, .campo.concepto, .campo.monto, .campo.moneda,
    .campo.pagador, .campo.notas, .campo.boton { grid-column: span 2; }
  }
  button.principal {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
  }
  button.principal:hover { filter: brightness(1.08); }
  button.principal:disabled { opacity: .6; cursor: wait; }

  /* ---- Tabla ---- */
  .tabla-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  th {
    text-align: left;
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--muted);
    padding: 8px 10px;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  td.num { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
  th.num { text-align: right; }
  .pill {
    font-size: .75rem;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .pill.ars { background: #e4ecf5; color: #2c5a8c; }
  .pill.usd { background: #e8f2ea; color: var(--green); }
  .pill.fede { background: #f5e9e0; color: var(--accent); }
  .pill.viejos { background: #ece6f2; color: #6a4a8c; }
  .notas-txt { color: var(--muted); font-size: .8rem; }
  button.borrar {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 6px;
  }
  button.borrar:hover { color: var(--red); background: #f7ecec; }

  .estado { text-align: center; color: var(--muted); padding: 20px; font-size: .9rem; }
  .error-box {
    background: #f7ecec;
    color: var(--red);
    border: 1px solid #e5c9c9;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: .9rem;
    display: none;
  }
</style>
</head>
<body>

<h1>🏗️ Contabilidad de la Obra</h1>
<p class="subtitle">Departamento — gastos compartidos 50/50 entre Fede y los viejos</p>

<div class="error-box" id="errorBox"></div>

<!-- ============ RESUMEN ============ -->
<div class="card">
  <div class="resumen-grid">
    <div class="moneda-box">
      <h2>Pesos <span class="badge">ARS</span></h2>
      <div class="fila"><span class="label">Pagó Fede</span><span id="arsFede">—</span></div>
      <div class="fila"><span class="label">Pagaron los viejos</span><span id="arsViejos">—</span></div>
      <div class="fila total"><span>Total</span><span id="arsTotal">—</span></div>
      <div class="saldo" id="arsSaldo">—</div>
    </div>
    <div class="moneda-box">
      <h2>Dólares <span class="badge">USD</span></h2>
      <div class="fila"><span class="label">Pagó Fede</span><span id="usdFede">—</span></div>
      <div class="fila"><span class="label">Pagaron los viejos</span><span id="usdViejos">—</span></div>
      <div class="fila total"><span>Total</span><span id="usdTotal">—</span></div>
      <div class="saldo" id="usdSaldo">—</div>
    </div>
  </div>
</div>

<!-- ============ FORMULARIO ============ -->
<div class="card">
  <form id="formGasto">
    <div class="campo fecha">
      <label for="fecha">Fecha</label>
      <input type="date" id="fecha" required>
    </div>
    <div class="campo concepto">
      <label for="concepto">Concepto</label>
      <input type="text" id="concepto" placeholder="Ej: Materiales, plomero, pintura…" required>
    </div>
    <div class="campo monto">
      <label for="monto">Monto</label>
      <input type="number" id="monto" min="0.01" step="0.01" placeholder="0.00" required>
    </div>
    <div class="campo moneda">
      <label for="moneda">Moneda</label>
      <select id="moneda">
        <option value="ARS">ARS (pesos)</option>
        <option value="USD">USD (dólares)</option>
      </select>
    </div>
    <div class="campo pagador">
      <label for="pagador">Pagó</label>
      <select id="pagador">
        <option value="Fede">Fede</option>
        <option value="Viejos">Los viejos</option>
      </select>
    </div>
    <div class="campo notas">
      <label for="notas">Notas (opcional)</label>
      <input type="text" id="notas" placeholder="Detalle extra…">
    </div>
    <div class="campo boton">
      <label>&nbsp;</label>
      <button type="submit" class="principal" id="btnAgregar">＋ Agregar gasto</button>
    </div>
  </form>
</div>

<!-- ============ TABLA ============ -->
<div class="card">
  <div class="tabla-wrap">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Concepto</th>
          <th class="num">Monto</th>
          <th>Moneda</th>
          <th>Pagó</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla"></tbody>
    </table>
  </div>
  <div class="estado" id="estado">Cargando…</div>
</div>

<script type="module">
/* ================================================================
   CONFIGURACIÓN — completá estos dos valores con los de tu proyecto
   Supabase (Settings → API en el panel de Supabase)
   ================================================================ */
const SUPABASE_URL = "https://znzazmiteeermlqonwkw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuemF6bWl0ZWVlcm1scW9ud2t3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDg4MzIsImV4cCI6MjA5OTUyNDgzMn0.m7H0PXg096YTDCUv5RfcnR8o0cRTqV9CVIUVJHAcifY";
/* ================================================================ */

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const $ = (id) => document.getElementById(id);
const errorBox = $("errorBox");

function mostrarError(msg) {
  errorBox.textContent = "⚠️ " + msg;
  errorBox.style.display = "block";
}

if (SUPABASE_URL.startsWith("PEGA_ACA")) {
  mostrarError("Falta configurar la URL y la anon key de Supabase. Abrí este archivo con un editor de texto y completá las dos constantes al principio del <script>.");
  $("estado").textContent = "Sin conexión a la base de datos.";
  throw new Error("Supabase sin configurar");
}

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const fmt = {
  ARS: new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS" }),
  USD: new Intl.NumberFormat("es-AR", { style: "currency", currency: "USD" }),
};

// Fecha de hoy por defecto (zona horaria local)
const hoy = new Date();
$("fecha").value = new Date(hoy.getTime() - hoy.getTimezoneOffset() * 60000)
  .toISOString().slice(0, 10);

let gastos = [];

async function cargar() {
  const { data, error } = await supabase
    .from("gastos")
    .select("*")
    .order("fecha", { ascending: false })
    .order("created_at", { ascending: false });
  if (error) { mostrarError("No pude cargar los gastos: " + error.message); return; }
  errorBox.style.display = "none";
  gastos = data;
  render();
}

function render() {
  // --- Tabla ---
  const cuerpo = $("cuerpoTabla");
  cuerpo.innerHTML = "";
  for (const g of gastos) {
    const tr = document.createElement("tr");
    const fecha = g.fecha.split("-").reverse().join("/");
    const notas = g.notas ? `<div class="notas-txt">${escapar(g.notas)}</div>` : "";
    tr.innerHTML = `
      <td style="white-space:nowrap">${fecha}</td>
      <td>${escapar(g.concepto)}${notas}</td>
      <td class="num">${fmt[g.moneda].format(g.monto)}</td>
      <td><span class="pill ${g.moneda.toLowerCase()}">${g.moneda}</span></td>
      <td><span class="pill ${g.pagador === "Fede" ? "fede" : "viejos"}">${g.pagador === "Fede" ? "Fede" : "Los viejos"}</span></td>
      <td><button class="borrar" title="Borrar" data-id="${g.id}">✕</button></td>`;
    cuerpo.appendChild(tr);
  }
  $("estado").textContent = gastos.length ? "" : "Todavía no hay gastos cargados.";
  $("estado").style.display = gastos.length ? "none" : "block";

  // --- Resumen por moneda ---
  for (const m of ["ARS", "USD"]) {
    const deMoneda = gastos.filter((g) => g.moneda === m);
    const fede = suma(deMoneda.filter((g) => g.pagador === "Fede"));
    const viejos = suma(deMoneda.filter((g) => g.pagador === "Viejos"));
    const total = fede + viejos;
    const pre = m.toLowerCase();
    $(pre + "Fede").textContent = fmt[m].format(fede);
    $(pre + "Viejos").textContent = fmt[m].format(viejos);
    $(pre + "Total").textContent = fmt[m].format(total);

    // Saldo: a cada parte le corresponde el 50%
    const dif = fede - total / 2; // >0: los viejos le deben a Fede
    const saldoEl = $(pre + "Saldo");
    if (Math.abs(dif) < 0.005) {
      saldoEl.textContent = "✔ Están a mano";
      saldoEl.className = "saldo ok";
    } else if (dif > 0) {
      saldoEl.textContent = `Los viejos le deben a Fede ${fmt[m].format(dif)}`;
      saldoEl.className = "saldo";
    } else {
      saldoEl.textContent = `Fede les debe a los viejos ${fmt[m].format(-dif)}`;
      saldoEl.className = "saldo";
    }
  }
}

const suma = (arr) => arr.reduce((acc, g) => acc + Number(g.monto), 0);

function escapar(txt) {
  const d = document.createElement("div");
  d.textContent = txt;
  return d.innerHTML;
}

// --- Agregar gasto ---
$("formGasto").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("btnAgregar");
  btn.disabled = true;
  const nuevo = {
    fecha: $("fecha").value,
    concepto: $("concepto").value.trim(),
    monto: Number($("monto").value),
    moneda: $("moneda").value,
    pagador: $("pagador").value,
    notas: $("notas").value.trim() || null,
  };
  const { error } = await supabase.from("gastos").insert(nuevo);
  btn.disabled = false;
  if (error) { mostrarError("No pude guardar el gasto: " + error.message); return; }
  $("concepto").value = "";
  $("monto").value = "";
  $("notas").value = "";
  $("concepto").focus();
  cargar();
});

// --- Borrar gasto ---
$("cuerpoTabla").addEventListener("click", async (e) => {
  const btn = e.target.closest("button.borrar");
  if (!btn) return;
  if (!confirm("¿Borrar este gasto?")) return;
  const { error } = await supabase.from("gastos").delete().eq("id", btn.dataset.id);
  if (error) { mostrarError("No pude borrar: " + error.message); return; }
  cargar();
});

cargar();
</script>
</body>
</html>
